name: Build Pre-Release

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pre-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Windows Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: npm run pack

      - name: Compute Release Metadata
        id: meta
        shell: pwsh
        run: |
          $branch = "${env:GITHUB_REF_NAME}" -replace '[^A-Za-z0-9._-]', '-'
          $shortSha = "${env:GITHUB_SHA}".Substring(0, 7)
          $tag = "pre-release-$branch-$shortSha"
          $name = "Pre-release $branch $shortSha"
          $artifact = "release-$branch-$shortSha"
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "name=$name" >> $env:GITHUB_OUTPUT
          "artifact=$artifact" >> $env:GITHUB_OUTPUT

      - name: Locate Installer Asset
        id: installer
        shell: pwsh
        run: |
          $installer = Get-ChildItem release -File -Filter '*Setup*.exe' | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $installer) {
            Write-Error 'No setup installer was produced under release/.'
            exit 1
          }
          "path=$($installer.FullName)" >> $env:GITHUB_OUTPUT
          "name=$($installer.Name)" >> $env:GITHUB_OUTPUT

      - name: Upload Workflow Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.artifact }}
          path: ${{ steps.installer.outputs.path }}
          if-no-files-found: error

      - name: Publish GitHub Pre-Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          target_commitish: ${{ github.sha }}
          prerelease: true
          generate_release_notes: true
          files: ${{ steps.installer.outputs.path }}
