name: Build Pre-Release

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pre-release-publish
  cancel-in-progress: false

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm ci

      - name: Setup Python (for node-gyp)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Rebuild Native Modules for Electron
        run: npx @electron/rebuild --force --only better-sqlite3

      - name: Compute Release Metadata
        id: meta
        if: github.event_name != 'pull_request'
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          $pkg = Get-Content package.json | ConvertFrom-Json
          $stableVersion = [string]$pkg.version
          $parts = $stableVersion.Split('.')
          if ($parts.Length -lt 3) {
            Write-Error "Unsupported package version: $stableVersion"
            exit 1
          }

          $major = [int]$parts[0]
          $minor = [int]$parts[1]
          $basePatch = [int]($parts[2] -replace '[^0-9].*$', '')

          $headers = @{
            Authorization = "Bearer $env:GITHUB_TOKEN"
            Accept        = "application/vnd.github+json"
            "User-Agent"  = "allbeingsfuture-prerelease-workflow"
          }
          $releases = Invoke-RestMethod -Headers $headers -Uri "https://api.github.com/repos/$env:GITHUB_REPOSITORY/releases?per_page=100"
          $pattern = "^betaV$major\.$minor\.(\d+)$"
          $maxPatch = $null

          foreach ($release in $releases) {
            $tagName = [string]$release.tag_name
            if ($tagName -match $pattern) {
              $patch = [int]$Matches[1]
              if ($null -eq $maxPatch -or $patch -gt $maxPatch) {
                $maxPatch = $patch
              }
            }
          }

          if ($null -eq $maxPatch) {
            $nextPatch = $basePatch
          } else {
            $nextPatch = $maxPatch + 1
          }

          $displayVersion = "betaV$major.$minor.$nextPatch"
          $packageVersion = "$major.$minor.$nextPatch-beta.0"
          $tag = $displayVersion
          $name = $displayVersion
          $artifact = "release-$displayVersion"

          "tag=$tag" >> $env:GITHUB_OUTPUT
          "name=$name" >> $env:GITHUB_OUTPUT
          "artifact=$artifact" >> $env:GITHUB_OUTPUT
          "display_version=$displayVersion" >> $env:GITHUB_OUTPUT
          "package_version=$packageVersion" >> $env:GITHUB_OUTPUT

      - name: Build Windows Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          ABF_DISPLAY_VERSION: ${{ steps.meta.outputs.display_version }}
          ABF_PACKAGE_VERSION: ${{ steps.meta.outputs.package_version }}
        run: |
          npm run build

          $builderArgs = @(
            '--win', 'nsis', 'portable',
            '-c.compression=store',
            '-c.nsis.differentialPackage=false'
          )

          if ($env:ABF_PACKAGE_VERSION) {
            $builderArgs += @(
              "-c.extraMetadata.version=$env:ABF_PACKAGE_VERSION",
              "-c.nsis.artifactName=AllBeingsFuture Setup $env:ABF_DISPLAY_VERSION.`${ext}",
              "-c.portable.artifactName=AllBeingsFuture Portable $env:ABF_DISPLAY_VERSION.`${ext}"
            )
            npx electron-builder @builderArgs
          } else {
            npx electron-builder @builderArgs
          }

      - name: Locate Windows Assets
        id: windows_assets
        shell: pwsh
        run: |
          $assets = Get-ChildItem release -File | Where-Object {
            $_.Name -like '*Setup*.exe' -or $_.Name -like '*Portable*.exe'
          } | Sort-Object Name
          if (-not $assets) {
            Write-Error 'No Windows setup or portable executable was produced under release/.'
            exit 1
          }

          Add-Content -Path $env:GITHUB_OUTPUT -Value 'paths<<EOF'
          $assets.FullName | ForEach-Object { Add-Content -Path $env:GITHUB_OUTPUT -Value $_ }
          Add-Content -Path $env:GITHUB_OUTPUT -Value 'EOF'

      - name: Upload Workflow Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.artifact || format('pr-build-{0}', github.event.pull_request.number || github.run_id) }}
          path: ${{ steps.windows_assets.outputs.paths }}
          if-no-files-found: error

      - name: Publish GitHub Pre-Release
        if: github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          target_commitish: ${{ github.sha }}
          prerelease: true
          generate_release_notes: true
          files: ${{ steps.windows_assets.outputs.paths }}
